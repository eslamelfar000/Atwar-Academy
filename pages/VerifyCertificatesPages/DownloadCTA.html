    <!-- Mobile Side Sheet -->
    <div id="mobileDrawer" class="fixed inset-0 z-50 hidden">
        <!-- Backdrop -->
        <div id="drawerBackdrop" class="absolute inset-0 bg-black/50 transition-opacity opacity-0"></div>

        <!-- Drawer Content - slides from right for RTL -->
        <div id="drawerContent"
            class="absolute right-0 top-0 h-full w-[80%] bg-white shadow-xl transform translate-x-full transition-transform duration-300 flex flex-col">
            <!-- Header -->
            <div class="flex items-end justify-center p-4 pb-4 pt-16 text-white bg-[var(--color-primary)]">
                <button id="closeBtn"
                    class="p-2 absolute top-2 left-2 text-white hover:text-[var(--color-secondary)] cursor-pointer">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>

                <div class="user flex items-center gap-2">
                    <i class="fa-regular fa-circle-user text-2xl"></i> <span>محمد الشهري</span>
                </div>
            </div>

            <!-- Navigation Links -->
            <div class="flex flex-col items-center p-4 py-6 gap-3">
                <a href=""
                    class="text-gray-700 text-xl hover:text-[var(--color-primary)] transition-colors py-2 ">الرئيسية</a>
                <a href="" class="text-gray-700 text-xl hover:text-[var(--color-primary)] transition-colors py-2">
                    الدورات التدريبية</a>
                <a href=""
                    class="text-gray-700 text-xl hover:text-[var(--color-primary)] transition-colors py-2">الدبلومات</a>

                    خصومات</a>
                <a href="" class="text-gray-700 text-xl hover:text-[var(--color-primary)] transition-colors py-2">الخطة
                    التدريبية</a>
                <a href="" class="text-gray-700 text-xl hover:text-[var(--color-primary)] transition-colors py-2">التحقق
                    من الشهادة
                </a>
                <a href=""
                    class="text-[var(--color-primary)] text-xl hover:text-[var(--color-primary)]/70 transition-colors py-2">الرسائل
                </a>
                <a href="" class="text-red-500 text-xl transition-colors py-2"> التنبيهات
                </a>
            </div>

            <!-- Auth Buttons -->
            <div class="p-4 mt-auto flex flex-col gap-2">
                <a href=""
                    class="w-full text-center bg-[var(--color-forth)] text-[var(--color-primary)] hover:text-white py-3 rounded-sm hover:bg-[var(--color-primary)] transition-all duration-300 cursor-pointer">
                    حسابي

    <!-- verify certificate -->
    <div class="verify-certificate min-h-[calc(100vh-200px)] p-6 lg:p-16">
        <!-- accordion -->
        <div class="accordion">
            <div class="accordion-item space-y-4">
                <div
                    class="accordion-header flex items-center justify-between bg-[var(--color-fifth)]/40 p-4 px-6 rounded cursor-pointer">
                    <h3 class="text-lg md:text-xl font-bold">تحميل الشهادة</h3>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="accordion-content overflow-hidden max-h-0 transition-all duration-300">
                    <div class="verify-certificate-box p-8 border border-gray-400 rounded-lg space-y-10">
                        <div class="top space-y-1">
                            <h3 class="text-xl font-bold md:text-3xl">شهادة إدخال البيانات ومعالجة النصوص</h3>
                        </div>

                        <div class="verify-certificate-footer space-y-6">
                            <div class="action">
                                <button type="submit"
                                    class="bg-[var(--color-fifth)] hover:bg-[var(--color-fifth)]/80 cursor-pointer w-full text-white rounded-lg p-4 transition-all duration-300">
                                    تحميل الشهادة bdf</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>



    <script>
        const menuBtn = document.getElementById("menuBtn");
        const closeBtn = document.getElementById("closeBtn");
        const mobileDrawer = document.getElementById("mobileDrawer");
        const drawerBackdrop = document.getElementById("drawerBackdrop");
        const drawerContent = document.getElementById("drawerContent");

        function openDrawer() {
            mobileDrawer.classList.remove("hidden");
            setTimeout(() => {
                drawerBackdrop.classList.remove("opacity-0");
                drawerContent.classList.remove("translate-x-full");
            }, 10);
        }

        function closeDrawer() {
            drawerBackdrop.classList.add("opacity-0");
            drawerContent.classList.add("translate-x-full");
            setTimeout(() => {
                mobileDrawer.classList.add("hidden");
            }, 300);
        }

        if (menuBtn) menuBtn.addEventListener("click", openDrawer);
        if (closeBtn) closeBtn.addEventListener("click", closeDrawer);
        if (drawerBackdrop) drawerBackdrop.addEventListener("click", closeDrawer);

        // Mobile Search Toggle
        const mobileSearchBtn = document.getElementById("mobileSearchBtn");
        const mobileSearchField = document.getElementById("mobileSearchField");
        const closeMobileSearch = document.getElementById("closeMobileSearch");

        if (mobileSearchBtn) {
            mobileSearchBtn.addEventListener("click", () => {
                mobileSearchField.classList.remove("hidden");
                mobileSearchField.querySelector("input").focus();
            });
        }

        if (closeMobileSearch) {
            closeMobileSearch.addEventListener("click", () => {
                mobileSearchField.classList.add("hidden");
            });
        }




        // CTA verify certificate
        document.addEventListener('DOMContentLoaded', () => {
            const headers = document.querySelectorAll('.accordion-header');

            headers.forEach((header) => {
                header.addEventListener('click', () => {
                    const content = header.nextElementSibling;
                    const icon = header.querySelector('i');

                    const isOpen = !content.classList.contains('max-h-0');

                    if (isOpen) {
                        content.classList.remove('max-h-[2000px]');
                        content.classList.add('max-h-0');
                        if (icon) icon.classList.remove('rotate-180');
                    } else {
                        content.classList.remove('max-h-0');
                        content.classList.add('max-h-[2000px]');
                        if (icon) icon.classList.add('rotate-180', 'transition-transform', 'duration-300');
                    }
                });
            });

            // Auto-open the first one
            if (headers.length > 0) {
                const firstHeader = headers[0];
                const firstContent = firstHeader.nextElementSibling;
                const firstIcon = firstHeader.querySelector('i');

                firstContent.classList.remove('max-h-0');
                firstContent.classList.add('max-h-[2000px]');
                if (firstIcon) firstIcon.classList.add('rotate-180');
            }
        });
    </script>
</body>
