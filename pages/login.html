<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../icons/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Atwar - Login</title>
</head>

<body>
    <div class="cover bg-[var(--color-forth)] min-h-screen relative overflow-hidden w-full h-full">

        <!-- Top Right Ellipse -->
        <div class="absolute top-0 right-0">
            <img src="../images/circle-ellipse.png" alt="" class=" object-contain rotate-180">
        </div>

        <!-- Bottom Left Ellipse -->
        <div class="absolute bottom-0 left-0">
            <img src="../images/circle-ellipse.png" alt="" class=" object-contain">
        </div>

        <!-- Login Section -->
        <section class="min-h-screen flex items-center justify-center py-12 px-4 relative z-10">
            <div class="max-w-md w-full">
                <!-- Login Card -->
                <div class="bg-white rounded-2xl shadow-xl p-8 md:p-10">
                    <!-- Logo -->
                    <div class="text-center mb-8">
                        <img src="../images/nav-logo.svg" alt="Phases Academy Logo" class="w-48 mx-auto mb-4">
                    </div>

                    <!-- Login Form -->
                    <form class="space-y-5">
                        <!-- ID Number Field -->
                        <div>
                            <label for="id-number" class="block text-right text-gray-700 text-sm mb-2">
                                رقم الهوية
                            </label>
                            <input type="text" id="id-number" placeholder="رقم الهوية"
                                class="w-full px-4 py-3 bg-white border border-gray-300 rounded-md text-right text-sm placeholder:text-gray-400 focus:outline-none focus:border-[var(--color-primary)]"
                                required>
                        </div>

                        <!-- Password Field -->
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <label for="password" class="text-right text-gray-700 text-sm">
                                    كلمة المرور
                                </label>
                                <a href="#"
                                    class="text-xs text-[var(--color-primary)] hover:text-[var(--color-secondary)] transition-colors duration-200 cursor-pointer">هل
                                    نسيت
                                    كلمة المرور؟</a>
                            </div>
                            <input type="password" id="password" placeholder="كلمة المرور"
                                class="w-full px-4 py-3 bg-white border border-gray-300 rounded-md text-right text-sm placeholder:text-gray-400 focus:outline-none focus:border-[var(--color-primary)]"
                                required>
                        </div>

                        <!-- Remember Me Checkbox -->
                        <div class="flex items-center justify-start gap-2">
                            <input type="checkbox" id="remember"
                            class="w-4 h-4 border-gray-300 rounded cursor-pointer accent-[var(--color-primary)]">
                            <label for="remember" class="text-sm text-gray-500 cursor-pointer">تذكرني</label>
                        </div>

                        <!-- Submit Button -->
                        <div class="pt-2">
                            <button type="submit"
                                class="w-full bg-[var(--color-primary)] hover:bg-[var(--color-secondary)] text-white text-sm py-3 rounded-md font-medium transition-colors duration-200">
                                تسجيل الدخول
                            </button>
                        </div>

                        <!-- Register Link -->
                        <div class="text-center pt-2">
                            <p class="text-sm text-gray-600">
                                ليس لديك حساب؟
                                <a href="#"
                                    class="text-[var(--color-primary)] hover:text-[var(--color-secondary)] font-medium transition-colors duration-200 cursor-pointer">انشاء
                                    حساب جديد</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>

</body>

</html>
