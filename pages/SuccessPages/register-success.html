<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../icons/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Atwar - Register Success</title>
</head>

<body class="">
    <!-- Success Message Section -->
    <section class="min-h-screen bg-[var(--color-forth)] flex items-center justify-center py-6 px-4">
        <div class="max-w-[1500px] w-full">
            <!-- Success Card -->
            <div class="bg-white rounded-2xl shadow-lg p-8 md:p-12 md:py-28 text-center">
                <!-- Success Illustration -->
                <div class="mb-4 flex justify-center">
                    <img src="../../images/regsiter-success.png" alt="Success" class="w-96 h-72 object-contain">
                </div>

                <!-- Success Title -->
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">
                    مرحبا بك في منصتنا
                </h1>

                <!-- Success Message -->
                <p class="text-green-500 text-xl md:text-2xl mb-8">
                    تم انشاء حسابك بنجاح
                </p>

                <!-- Action Button -->
                <div class="flex justify-center">
                    <a href="#">
                        <button
                            class="bg-green-500 cursor-pointer hover:bg-green-600 text-white px-10 py-3 rounded-md text-sm font-medium transition-colors duration-200">
                            الذهاب للصفحة الرئيسية
                        </button>
                    </a>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
