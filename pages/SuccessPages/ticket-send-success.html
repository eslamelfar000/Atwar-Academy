<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../icons/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Atwar - Ticket Send Success</title>
</head>

<body>
    <!-- Success Message Section -->
    <section class="min-h-screen bg-[var(--color-forth)] flex items-center justify-center py-6 px-4">
        <div class="max-w-[1500px] w-full">
            <!-- Success Card -->
            <div class="bg-white rounded-2xl shadow-lg p-8 md:p-12 md:py-20 text-center">
                <!-- Success Illustration -->
                <div class="mb-6 flex justify-center">
                    <img src="../../images/ticket-send-success.png" alt="Success" class="w-96 h-72 object-contain">
                </div>

                <!-- Success Title -->
                <h1 class="text-2xl md:text-3xl font-bold text-green-500 mb-4">
                    تم إنشاء التذكرة بنجاح
                </h1>

                <!-- Success Message -->
                <div class="text-gray-500 text-lg max-w-lg mb-8 space-y-4 mx-auto">
                    <p>تم إنشاء تذكرتك وإرسالها إلى فريق الدعم الفني. رقم التذكرة الخاص بك هو: ( )</p>
                    <p>سيتم الرد عليك خلال (24–48 ساعة). يمكنك متابعة حالة التذكرة من خلال لوحة التحكم.</p>
                </div>

                <!-- Action Button -->
                <div class="flex justify-center">
                    <a href="#">
                        <button
                            class="bg-[var(--color-primary)] hover:bg-[var(--color-secondary)] text-white px-10 py-3 rounded-md text-sm font-medium transition-colors duration-200">
                            الذهاب للصفحة الرئيسية
                        </button>
                    </a>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
