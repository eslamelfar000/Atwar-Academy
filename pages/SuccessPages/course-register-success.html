<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../icons/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Atwar - Course Reg Success</title>
</head>

<body class="bg-gray-50">
    <!-- Success Message Section -->
    <section class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-2xl w-full text-center">
            <!-- Success Illustration -->
            <div class="mb-4 flex justify-center">
                <img src="../../images/course-reg-success.png" alt="Success" class="w-96 h-72 object-contain">
            </div>

            <!-- Success Title -->
            <h1 class="text-3xl md:text-4xl font-bold text-green-500 mb-6">
                تم تسجيلك بنجاح
            </h1>

            <!-- Success Message -->
            <div class="space-y-2 mb-8">
                <p class="text-gray-600 text-lg">شكراً لك</p>
                <p class="text-gray-600 text-base">تم اتمام عملية التسجيل في الدورة بنجاح</p>
                <p class="text-gray-600 text-base">يمكنك الولوج في استكشاف محتوى الدورة من خلال لوحة التحكم</p>
            </div>

            <!-- Action Button -->
            <div class="flex justify-center">
                <a href="">
                    <button
                        class="bg-[var(--color-primary)] hover:bg-[var(--color-secondary)] cursor-pointer text-white px-16 py-2 rounded-md font-medium transition-colors duration-200">
                        ابدأ الدورة الآن
                    </button>
                </a>
            </div>
        </div>
    </section>
</body>

</html>
