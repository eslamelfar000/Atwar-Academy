<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../icons/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Atwar - Create Support Ticket</title>
</head>

<body class="">
    <div class="layout min-h-[calc(100vh-100px)] bg-white">
        <!-- page actions [ breadcrumb ] -->
        <section class="page-actions relative py-2 pt-16">
            <div class="max-w-7xl mx-auto px-8 sm:px-6 z-10 space-y-6">
                <!-- breadcrumb -->
                <div class="breadcrumb">
                    <ul class="flex items-center gap-2">
                        <li>
                            <a href="#" class="text-[var(--color-primary)] text-lg">
                                <i class="fa-regular fa-house"></i>
                            </a>
                        </li>
                        <li>
                            <i class="fa-solid fa-chevron-left text-xs text-[var(--color-primary)]"></i>
                        </li>
                        <li>
                            <p class="">انشاء التذكرة الدعم الفني</p>
                        </li>
                    </ul>
                </div>
            </div>
        </section>

        <!-- Support Ticket Form Section -->
        <section class="py-6">
            <div class="max-w-7xl mx-auto px-8 sm:px-6">
                <!-- Form Container -->
                <div class="space-y-10">
                    <div class="header-full flex flex-col md:flex-row gap-4 w-full justify-between md:items-end">
                        <!-- Header -->
                        <div class="">
                            <h1 class="text-3xl font-bold text-gray-800 mb-2">طلب دعم فني لحل المشكلة بسرعة
                            </h1>
                            <p class="text-[var(--color-eighth)] text-lg">اضافة تفاصيل المشكلة</p>
                        </div>
                        <!-- Back Button -->
                        <div class="flex justify-end md:justify-auto hidden md:block">
                            <a href="">
                                <button
                                    class="bg-[var(--color-secondary)] cursor-pointer hover:bg-[var(--color-secondary)] text-white px-6 py-1 pb-2 rounded-sm flex items-center gap-2 font-medium transition-colors duration-200">
                                    <img src="../images/curve-arrow.svg" alt="" class="w-6 h-6 -mb-2">
                                    رجوع
                                </button>
                            </a>
                        </div>
                    </div>

                    <!-- Form -->
                    <form class="space-y-6">
                        <div class="cover grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-14">
                            <!-- Row 1: Name and Request Type -->
                            <div class="space-y-6">
                                <!-- Name -->
                                <div>
                                    <label class="block text-right text-gray-700 text-sm mb-2">
                                        الاسم <span class="text-red-500">*</span>
                                    </label>
                                    <input type="text"
                                        class="w-full px-4 py-3 bg-white border border-gray-300 rounded-md text-sm text-right focus:outline-none focus:border-[var(--color-primary)]"
                                        required>
                                </div>
                                <!-- Mobile Number -->
                                <div>
                                    <label class="block text-right text-gray-700 text-sm mb-2">
                                        رقم الجوال <span class="text-red-500">*</span>
                                    </label>
                                    <input type="tel"
                                        class="w-full px-4 py-3 bg-white border border-gray-300 rounded-md text-sm text-right focus:outline-none focus:border-[var(--color-primary)]"
                                        required>
                                </div>
                            
                                <!-- Title -->
                                <div>
                                    <label class="block text-right text-gray-700 text-sm mb-2">
                                        العنوان <span class="text-red-500">*</span>
                                    </label>
                                    <input type="text"
                                        class="w-full px-4 py-3 bg-white border border-gray-300 rounded-md text-sm text-right focus:outline-none focus:border-[var(--color-primary)]"
                                        required>
                                </div>
                            
                                <!-- Details -->
                                <div>
                                    <label class="block text-right text-gray-700 text-sm mb-2">
                                        التفاصيل <span class="text-red-500">*</span>
                                    </label>
                                    <textarea rows="1"
                                        class="w-full px-4 py-3 bg-white border border-gray-300 rounded-md text-sm text-right focus:outline-none focus:border-[var(--color-primary)]"
                                        required></textarea>
                                </div>
                            
                            </div>
                            
                            <!-- Row 2: Mobile Number and Priority -->
                            <div class="space-y-6">
                                <!-- Request Type -->
                                <div>
                                    <label class="block text-right text-gray-700 text-sm mb-2">
                                        نوع الطلب <span class="text-red-500">*</span>
                                    </label>
                                    <input type="text"
                                        class="w-full px-4 py-3 bg-white border border-gray-300 rounded-md text-sm text-right focus:outline-none focus:border-[var(--color-primary)]"
                                        required>
                                </div>
                            
                                <!-- Priority -->
                                <div>
                                    <label class="block text-right text-gray-700 text-sm mb-2">
                                        الجودة <span class="text-red-500">*</span>
                                    </label>
                                    <select
                                        class="w-full px-4 py-3 bg-white border border-gray-300 rounded-md text-sm text-right focus:outline-none focus:border-[var(--color-primary)]"
                                        required>
                                        <option value="">اختر</option>
                                        <option value="high">عالية</option>
                                        <option value="medium">متوسطة</option>
                                        <option value="low">منخفضة</option>
                                    </select>
                                </div>
                            
                            
                                <!-- Attachments -->
                                <div>
                                    <label class="block text-right text-gray-700 text-sm mb-2">
                                        المرفقات <span class="text-red-500">*</span>
                                    </label>
                                    <div class="space-y-4">
                                        <div class="relative flex">
                                            <input type="file" class="hidden" id="file-upload" multiple>
                                            <label for="file-upload"
                                                class="px-4 py-3 bg-[var(--color-primary)] hover:bg-[var(--color-secondary)] text-white text-sm rounded-md cursor-pointer transition-colors duration-200 flex items-center justify-center">
                                                اضافة المرفقات
                                            </label>
                                        </div>
                                        <!-- Progress Bar -->
                                        <div class="w-full bg-gray-200 rounded-sm h-auto overflow-hidden px-2">
                                            <span class="text-sm text-gray-400">Complete 0%</span>
                                            <div class="bg-[var(--color-primary)] h-auto rounded-sm transition-all duration-300" style="width: 0%">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            
                            
                                <div class="buttons flex items-center gap-2 justify-end">
                                    <!-- Back Button -->
                                    <div class="md:hidden bock">
                                        <a href="">
                                            <button
                                                class="bg-[var(--color-primary)] cursor-pointer hover:bg-[var(--color-secondary)] text-white px-6 py-2 pb-3 rounded-sm flex items-center gap-2 font-medium transition-colors duration-200">
                                                <img src="../images/curve-arrow.svg" alt="" class="w-6 h-6 -mb-2">
                                                رجوع
                                            </button>
                                        </a>
                                    </div>
                                    <!-- Submit Button -->
                                    <div class="md:mt-10">
                                        <button type="submit"
                                            class="bg-green-500 cursor-pointer text-sm hover:bg-green-600 text-white px-8 py-3 rounded-sm font-medium transition-colors duration-200">
                                            حفظ
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>
</body>

</html>
