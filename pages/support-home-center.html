<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../icons/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Atwar - Help Center</title>
</head>

<body class="bg-gradient-to-b from-[var(--color-primary)]/70 from-[5%] to-[var(--color-forth)] to-[80%] min-h-screen">
    <div class="min-h-screen flex flex-col mx-auto">
        <!-- Header -->
        <header class="px-6 py-4">
            <div class="flex items-center justify-between">
                <button class="text-white absolute top-4 left-4">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col justify-center p-6 md:px-20">
            <!-- Welcome Section -->
            <div class="mb-22">
                <h2 class="text-4xl font-bold text-[var(--color-primary)] mb-2">
                    هلا والله 👋
                </h2>
                <p class="text-[var(--color-primary)] text-4xl font-bold">
                    كيف يمكننا مساعدتك؟
                </p>
            </div>

            <!-- Action Cards -->
            <div class="space-y-4">
                <!-- Send Message Card -->
                <div class="bg-white rounded-2xl border border-[var(--color-fifth)] p-6 ">
                    <div class="flex items-center justify-between gap-3">
                        <div class="flex-1 text-right">
                            <h3 class="text-[var(--color-fifth)] font-bold text-xl">ارسل لنا رسالة</h3>
                        </div>
                        <div class="hover:bg-[var(--color-forth)] p-2 rounded-full cursor-pointer">
                            <i class="fa-solid fa-paper-plane text-[var(--color-fifth)] text-2xl rotate-45"></i>
                        </div>
                    </div>
                </div>

                <!-- Message Card 1 - Active -->
                <div class="bg-white rounded-2xl border border-[var(--color-fifth)] p-6 relative">
                    <div class="space-y-2">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <span class="text-xl text-[var(--color-fifth)]">الرسالة الأخيرة</span>
                            </div>
                            <span class="text-md text-gray-400 absolute top-1/2 -translate-y-1/2 left-4">4 أيام</span>
                        </div>
                        <div class="info flex items-center gap-2">
                            <div class="icon bg-[var(--color-forth)] p-4 rounded-full">
                                <i class="fa-regular fa-comments text-[var(--color-primary)] text-2xl"></i>
                            </div>
                            <div class="content">
                                <p class="text-md text-gray-500 text-right">الحاجة الى مساعدة</p>
                                <p class="text-md text-gray-400 text-right flex items-center gap-3">
                                    <span>#98018477</span>
                                    <span class="text-lg text-[var(--color-fifth)]">تم الحل</span>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bg-white px-6 py-3 border-t border-gray-600 sticky bottom-0 z-50 lg:hidden">
            <div class="flex items-center justify-around">
                <a href="./support-home-center.html"
                    class="flex flex-col items-center gap-1  text-[var(--color-primary)]">
                    <i class="fa-solid fa-house text-xl"></i>
                    <span class="text-sm md:text-md text-[var(--color-fifth)]">الصفحة الرئيسية</span>
                </a>
                <a href="./support-messages.html" class="flex flex-col items-center gap-1 text-gray-400">
                    <div class="relative">
                        <i class="fa-regular fa-message text-xl"></i>

                        <span
                            class="absolute -top-1 -right-2 bg-red-500 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">1</span>
                    </div>
                    <span class="text-sm md:text-md ">الرسائل</span>
                </a>
                <a href="./support-ticket.html" class="flex flex-col items-center gap-1 text-gray-400">

                    </svg>
                    </svg> <span class="text-sm md:text-md">تذكرة الدعم</span>

                </a>
            </div>
        </nav>
    </div>
</body>

</html>
