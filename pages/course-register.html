<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../icons/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Atwar - Course Register</title>
</head>

<body class="">
    <div class="layout min-h-[calc(100vh-100px)] bg-white">
        <!-- page actions [ breadcrumb, search , per page selection ] -->
        <section class="page-actions relative py-2 pt-16 ">
            <div class="max-w-7xl mx-auto px-8 sm:px-6 z-10 space-y-6">
                <!-- breadcrumb -->
                <div class="breadcrumb">
                    <ul class="flex items-center gap-2">
                        <li>
                            <a href="#" class="text-[var(--color-primary)] text-lg">
                                <i class="fa-regular fa-house"></i>
                            </a>
                        </li>
                        <li>
                            <i class="fa-solid fa-chevron-left text-xs text-[var(--color-primary)]"></i>
                        </li>
                        <li>
                            <p class="">التسجيل في الدورة</p>
                        </li>
                    </ul>
                </div>
            </div>
        </section>

        <!-- Registration Form Section -->
        <section class="py-6">
            <div class="max-w-7xl mx-auto px-8 sm:px-6">
                <div class="small-title mb-8">
                    <h3 class="text-lg font-bold text-gray-800 mb-2">بيانات المتدرب</h3>
                </div>
                <!-- Form Container -->
                <div class="space-y-10">
                    <div class="header-full flex flex-col md:flex-row gap-4 w-full justify-between md:items-end">
                        <!-- Header -->
                        <div class="">
                            <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">شكل بياناتك للالتحاق بالدورة
                            </h1>
                            <p class="text-red-500 text-lg">يرجى ادخال بياناتك لإتمام التسجيل في الدورة</p>
                        </div>
                        <!-- Back Button -->
                        <div class="flex justify-end md:justify-auto">
                            <a href="">
                                <button
                                    class="bg-[#C4A574] cursor-pointer hover:bg-[var(--color-secondary)] text-white px-6 py-1 pb-2 rounded-sm flex items-center gap-2 font-medium transition-colors duration-200">
                                    <img src="../images/curve-arrow.svg" alt="" class="w-6 h-6 -mb-2">
                                    رجوع
                                </button>
                            </a>
                        </div>
                    </div>

                    <!-- Form -->
                    <form class="space-y-6">
                        <!-- Row 1: Name Fields -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- First Name -->
                            <div>
                                <label class="block text-right text-gray-700 mb-2">
                                    اسم المتدرب (الاسم بالعربي) <span class="text-red-500">*</span>
                                </label>
                                <input type="text" placeholder="الرجاء ادخال اسمك كما هو في الهوية"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-md text-sm text-right focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)] focus:border-transparent"
                                    required>
                            </div>

                            <!-- Email -->
                            <div>
                                <label class="block text-right text-gray-700 mb-2">
                                    البريد الالكتروني <span class="text-red-500">*</span>
                                </label>
                                <input type="email"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-md text-sm text-right focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)] focus:border-transparent"
                                    required>
                                <p class="text-xs text-red-500 text-right mt-1">سيتم ارسال رسالة تفعيل الحساب للبريد
                                    الالكتروني المدخل</p>
                            </div>
                        </div>

                        <!-- Row 2: Phone Numbers -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Mobile Number 1 -->
                            <div>
                                <label class="block text-right text-gray-700 mb-2">
                                    رقم الهوية <span class="text-red-500">*</span>
                                </label>
                                <input type="tel" placeholder="ادخل رقم الهوية بشكل صحيح"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-md text-sm text-right focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)] focus:border-transparent"
                                    required>
                            </div>

                            <!-- Password -->
                            <div>
                                <label class="block text-right text-gray-700 mb-2">
                                    كلمة المرور <span class="text-red-500">*</span>
                                </label>
                                <input type="password"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-md text-sm text-right focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)] focus:border-transparent"
                                    required>
                            </div>
                        </div>

                        <!-- Row 3: Mobile Number 2 and Confirm Password -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Mobile Number 2 -->
                            <div>
                                <label class="block text-right text-gray-700 mb-2">
                                    رقم الجوال <span class="text-red-500">*</span>
                                </label>
                                <input type="tel"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-md text-sm text-right focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)] focus:border-transparent"
                                    required>
                                <p class="text-xs text-red-500 text-right mt-1">يجب ان تكون رقم الجوال مطابقة للمعلومات
                                </p>
                            </div>

                            <!-- Confirm Password -->
                            <div class="space-y-4">
                                <div class="input-info">
                                    <label class="block text-right text-gray-700 mb-2">
                                        تأكيد كلمة المرور <span class="text-red-500">*</span>
                                    </label>
                                    <input type="password"
                                        class="w-full px-4 py-3 border border-gray-300 rounded-md text-sm text-right focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)] focus:border-transparent"
                                        required>
                                </div>


                                <!-- Checkboxes -->
                                <div class="space-y-1">
                                    <div class="flex items-center justify-start gap-2">
                                        <input type="checkbox" id="terms"
                                            class="w-4 h-4 border-gray-300 rounded-md text-sm cursor-pointer accent-[var(--color-primary)]"
                                            required>
                                        <label for="terms"
                                            class="text-sm text-[var(--color-primary)] cursor-pointer select-none">أوافق على
                                            الشروط والأحكام</label>
                                    </div>
                                    <div class="flex items-center justify-start gap-2">
                                        <input type="checkbox" id="privacy"
                                            class="w-4 h-4 border-gray-300 rounded cursor-pointer accent-[var(--color-primary)]"
                                            required>
                                        <label for="privacy"
                                            class="text-sm text-[var(--color-primary)] cursor-pointer select-none">أوافق على
                                            سياسة الخصوصية</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <div class="flex justify-end pt-4">
                            <button type="submit"
                                class="bg-green-500 cursor-pointer text-sm hover:bg-green-600 text-white px-4 py-2 rounded-sm font-medium transition-colors duration-200">
                                تسجيل في الدورة
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>

</body>

</html>
