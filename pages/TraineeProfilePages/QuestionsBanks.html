                                        <button
                                            class="text-gray-300 hover:text-black transition-colors cursor-pointer"><i
                                                class="fa-solid fa-chevron-up text-[10px]"></i></button>
                                        <button
                                            class="text-gray-300 hover:text-black transition-colors cursor-pointer"><i
                                                class="fa-solid fa-chevron-down text-[10px]"></i></button>
                                    </div>
                                </div>
                                <div class="flex items-center gap-3">
                                    <input type="checkbox" id="selectAll"
                                    class="w-5 h-5 rounded border-2 border-gray-200 accent-black transition-all cursor-pointer">
                                    <label for="selectAll" class="text-sm font-bold text-gray-500 cursor-pointer">تحديد كل
                                        الأسئلة</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Modal Footer -->
                <div class="p-6 bg-white border-t border-gray-50 flex items-center justify-between gap-4">
                    <button
                        class="bg-black hover:bg-gray-800 text-white font-extrabold py-3 px-10 rounded flex items-center gap-3 shadow-lg flex-1 sm:flex-none justify-center transition-all transform active:scale-95 cursor-pointer">
                        <i class="fa-solid fa-download"></i>
                        استدعاء من بنك الأسئلة
                    </button>
                    <button id="cancelImport"
                        class="bg-gray-100 hover:bg-gray-200 font-extrabold py-3 px-10 rounded transition-all cursor-pointer">
                        إلغاء
                    </button>
                </div>
            </div>
        </div>
    </trainee-layout>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Delay initialization to ensure trainee-layout has finished moving elements
            setTimeout(() => {
                const openModalBtn = document.getElementById('openImportModal');
                const modal = document.getElementById('importModal');
                const closeModalBtn = document.getElementById('closeImportModal');
                const cancelBtn = document.getElementById('cancelImport');
                const modalBox = modal?.querySelector('div');

                function openModal() {
                    if (modal) {
                        modal.classList.remove('hidden');
                        modal.classList.add('flex');
                        // Small extra delay to ensure display:flex is rendered before starting transition
                        requestAnimationFrame(() => {
                            modal.classList.remove('opacity-0');
                            modal.classList.add('opacity-100');
                            if (modalBox) {
                                modalBox.classList.remove('scale-95');
                                modalBox.classList.add('scale-100');
                            }
                        });
                    }
                }

                function closeModal() {
                    if (modal) {
                        modal.classList.add('opacity-0');
                        modal.classList.remove('opacity-100');
                        if (modalBox) {
                            modalBox.classList.add('scale-95');
                            modalBox.classList.remove('scale-100');
                        }
                        setTimeout(() => {
                            modal.classList.add('hidden');
                            modal.classList.remove('flex');
                        }, 300);
                    }
                }

                if (openModalBtn) {
                    openModalBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        openModal();
                    });
                }

                if (closeModalBtn) closeModalBtn.addEventListener('click', closeModal);
                if (cancelBtn) cancelBtn.addEventListener('click', closeModal);

                if (modal) {
                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) closeModal();
                    });
                }
            }, 500); // 500ms should be plenty for trainee-layout to settle
        });

        new TomSelect("#select-bank", {
            plugins: ['remove_button'],
            placeholder: "اختر البنك...",
        });
    </script>
</body>
