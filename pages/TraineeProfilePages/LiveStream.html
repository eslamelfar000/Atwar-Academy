<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البث المباشر</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../icons/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="../../js/TraineeLayout.js"></script>
</head>

<body>
    <trainee-layout active-tab="liveStream">
        <div class="cover p-4 sm:p-6 lg:p-8 space-y-6">
            <!-- head -->
            <div class="exams-head bg-[var(--color-primary)] p-4 px-8 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="icon -mb-1">
                        <i class="fas fa-wifi text-white text-2xl rotate-45"></i>
                    </div>
                    <div class="info">
                        <h1 class="text-lg sm:text-2xl font-bold text-white ">
                            بث مباشر</h1>
                    </div>
                </div>

                <!-- Mobile Menu Button -->
                <button id="menuToggle"
                    class="lg:hidden text-white cursor-pointer p-1 pt-2 bg-white/10 hover:bg-white/20 rounded-lg transition-all duration-300">
                    <i class="fas fa-bars text-xl"></i>
                </button>
            </div>


            <!-- content -->
            <div class="live-stream space-y-4">
                <!-- Video Player Container -->
                <div
                    class="live-stream-player rounded-2xl overflow-hidden shadow-lg bg-white border border-gray-100 flex flex-col">
                    <!-- Video Area -->
                    <div
                        class="relative w-full bg-[#4772AB] flex items-center justify-center p-4 sm:p-8 md:p-12">
                        <!-- Live Badge -->
                        <div class="absolute top-4 left-4 sm:top-6 sm:left-6 z-20">
                            <span
                                class="bg-[#EF4444] text-white px-3 sm:px-5 py-1 sm:py-2 rounded-lg text-xs sm:text-sm font-bold shadow-lg flex items-center gap-2">
                                <span class="w-2 h-2 bg-white rounded-full animate-pulse"></span>
                                Live
                            </span>
                        </div>

                        <!-- Illustration -->
                        <div
                            class="relative w-full max-w-lg mx-auto transform hover:scale-105 transition-transform duration-500 cursor-pointer">
                            <img src="../../images/live-img.png" alt="live-img" class="w-full h-full object-cover">
                        </div>
                    </div>

                    <!-- Title Bar -->
                    <div
                        class="bg-[var(--color-forth)] p-6 sm:p-8 md:p-10 border-b border-gray-100">
                        <h2 class="text-xl sm:text-2xl md:text-3xl font-bold">دبلوم
                            السلامة والصحة المهنية</h2>
                        </div>
                        
                        <!-- Player Controls -->
                        <div class="bg-[var(--color-forth)] p-2  px-6 sm:px-10 border-t border-[var(--color-ninth)] flex items-center justify-between">
                        <!-- Right Controls -->
                        <div class="flex items-center text-[var(--color-tenth)]">
                            <!-- Custom Settings Toggle Icon as in the image -->
                            <button
                                class="w-10 h-10 flex items-center justify-center hover:bg-gray-100 rounded-full transition-all group active:scale-95 cursor-pointer">
                                <i class="fas fa-expand text-xl group-hover:text-[var(--color-fifth)]"></i>
                            </button>
                            <button
                                class="p-2 hover:bg-gray-100 rounded-lg transition-all active:scale-95 cursor-pointer">
                                <div class="w-10 h-5 bg-[var(--color-tenth)] rounded-full relative">
                                    <div class="absolute right-1.5 top-1.5 w-2 h-2 bg-white rounded-full"></div>
                                </div>
                            </button>
                        </div>
                        <!-- Left Controls -->
                        <div class="flex items-center gap-1 text-[var(--color-tenth)]">
                            <button
                                class="w-10 h-10 flex items-center justify-center hover:bg-gray-100 rounded-full transition-all group active:scale-90 cursor-pointer">
                                <i class="fas fa-video-camera text-xl group-hover:text-[var(--color-fifth)]"></i>
                            </button>
                            <div class="h-8 w-[1px] bg-gray-200"></div>
                            <button
                                class="w-10 h-10 flex items-center justify-center hover:bg-gray-100 rounded-full transition-all group active:scale-90 cursor-pointer">
                                <i class="fas fa-play text-xl group-hover:text-[var(--color-fifth)]"></i>
                            </button>
                        </div>

                    </div>
                </div>

                <!-- Comment Section -->
                <div class="comment-area pt-8">
                    <div class="relative group">
                        <input type="text" placeholder="إضافة تعليقك"
                            class="w-full bg-transparent border-b-2 border-gray-200 py-4 px-2 text-lg md:text-xl font-medium focus:outline-none focus:border-[var(--color-primary)] transition-all placeholder:text-gray-400">
                        <div
                            class="absolute bottom-0 right-0 w-0 h-[2px] bg-[var(--color-primary)] group-focus-within:w-full transition-all duration-300">
                        </div>
                    </div>
                </div>
            </div>
    </trainee-layout>
</body>

</html>
