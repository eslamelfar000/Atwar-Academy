<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات الحساب</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../icons/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="../../js/TraineeLayout.js"></script>
</head>

<body>

    <!-- استخدام المكون الجديد هنا، وهو سيقوم تلقائيا بجلب القائمة الجانبية والهيدر -->
    <trainee-layout active-tab="accountSettings">

        <!-- كل ما يوضع هنا هو محتوى الصفحة وسيدخل في منطقة الـ Outlet -->
        <div class="w-full">
            <div
                class="head relative mb-4 sm:mb-8 px-4 text-center bg-[var(--color-primary)] flex items-center justify-between lg:justify-center">
                <h1 class="text-xl sm:text-2xl p-4 font-bold text-white ">
                    إعدادات الحساب</h1>
                <!-- Mobile Menu Button -->
                <button id="menuToggle"
                    class="lg:hidden text-white cursor-pointer p-1 pt-2 bg-white/10 hover:bg-white/20 rounded-lg transition-all duration-300">
                    <i class="fas fa-bars text-xl"></i>
                </button>
            </div>


            <form class="space-y-4 sm:space-y-6 p-4 sm:p-6 lg:p-10">
                <!-- Profile Image Upload -->
                <div class="flex flex-col sm:flex-row items-center sm:items-end gap-4 sm:gap-6">
                    <div
                        class="w-32 h-32 sm:w-36 sm:h-36 lg:w-40 lg:h-40 bg-[var(--color-fifth)] rounded-lg flex-shrink-0">
                    </div>
                    <div class="flex-1 w-full">
                        <label class="block text-gray-700 font-bold mb-2 text-sm sm:text-base">تحديث صورة</label>
                        <div
                            class="border-2 border-dashed border-gray-300 rounded-lg p-6 sm:p-8 lg:p-12 text-center bg-gray-50">
                            <p class="text-gray-500 mb-2 text-xs sm:text-sm">حجم الصورة 300 px 300 px</p>
                            <button type="button"
                                class="bg-red-400/20 p-2 px-4 sm:px-6 cursor-pointer text-red-500 text-xs sm:text-sm font-bold">حذف</button>
                        </div>
                    </div>
                </div>

                <!-- Username Fields -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                    <div>
                        <label class="block text-gray-700 font-bold mb-2 text-sm sm:text-base">الاسم بالإنجليزي <span
                                class="text-red-500 text-xs sm:text-sm">(يتم
                                استخدامه عند طباعة الشهادة)</span></label>
                        <input type="text"
                            class="w-full border border-gray-300 rounded-lg px-3 sm:px-4 py-2 sm:py-3 text-sm focus:outline-none focus:border-[var(--color-primary)] focus:ring-0">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-bold mb-2 text-sm sm:text-base">الاسم بالعربي</label>
                        <input type="text"
                            class="w-full border border-gray-300 rounded-lg px-3 sm:px-4 py-2 sm:py-3 focus:outline-none focus:border-[var(--color-primary)] focus:ring-0">
                    </div>
                </div>

                <!-- Email and Mobile -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                    <div>
                        <label class="block text-gray-700 font-bold mb-2 text-sm sm:text-base">تغيير رقم الجوال</label>
                        <input type="tel"
                            class="w-full border border-gray-300 rounded-lg px-3 sm:px-4 py-2 sm:py-3 focus:outline-none focus:border-[var(--color-primary)] focus:ring-0">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-bold mb-2 text-sm sm:text-base">رقم الجوال</label>
                        <input type="tel"
                            class="w-full border border-gray-300 rounded-lg px-3 sm:px-4 py-2 sm:py-3 focus:outline-none focus:border-[var(--color-primary)] focus:ring-0">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2 text-sm sm:text-base">البريد الإلكتروني</label>
                    <input type="email"
                        class="w-full border border-gray-300 rounded-lg px-3 sm:px-4 py-2 sm:py-3 focus:outline-none focus:border-[var(--color-primary)] focus:ring-0">
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="w-full bg-[var(--color-primary)] text-white py-3 sm:py-4 rounded-lg hover:opacity-90 transition text-base sm:text-lg font-bold">
                    إعادة تعيين كلمة السر
                </button>
            </form>
        </div>
    </trainee-layout>
</body>

</html>
