<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../icons/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Atwar - Employee Register</title>
</head>

<body>
    <div class="min-h-screen flex flex-col lg:flex-row bg-[var(--color-forth)]">
        <!-- Right Side - Registration Form -->
        <div class="w-full lg:w-1/2 flex items-center justify-center p-8 order-2 lg:order-1">
            <div class="max-w-md w-full">
                <!-- Title -->
                <h1 class="text-3xl font-bold text-gray-800 text-center mb-8">تسجيل حساب جديد</h1>

                <!-- Registration Form -->
                <form class="space-y-5">
                    <!-- Triple Name -->
                    <div>
                        <label for="full-name" class="block text-right text-gray-700 text-sm mb-2">
                            الإسم الثلاثي
                        </label>
                        <input type="text" id="full-name"
                            class="w-full px-4 py-3 bg-white border border-gray-300 rounded-md text-right text-sm focus:outline-none focus:border-[var(--color-primary)]"
                            required>
                    </div>

                    <!-- ID Number -->
                    <div>
                        <label for="id-number" class="block text-right text-gray-700 text-sm mb-2">
                            رقم الهوية
                        </label>
                        <input type="text" id="id-number"
                            class="w-full px-4 py-3 bg-white border border-gray-300 rounded-md text-right text-sm focus:outline-none focus:border-[var(--color-primary)]"
                            required>
                    </div>

                    <!-- Mobile Number -->
                    <div>
                        <label for="mobile" class="block text-right text-gray-700 text-sm mb-2">
                            رقم الجوال
                        </label>
                        <input type="tel" id="mobile"
                            class="w-full px-4 py-3 bg-white border border-gray-300 rounded-md text-right text-sm focus:outline-none focus:border-[var(--color-primary)]"
                            required>
                    </div>

                    <!-- Password -->
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label for="password" class="text-right text-gray-700 text-sm">
                                كلمة المرور
                            </label>
                            <a href="#"
                                class="text-xs text-[var(--color-fifth)] hover:text-[var(--color-third)] transition-colors duration-200">هل
                                نسيت كلمة
                                المرور؟</a>
                        </div>
                        <input type="password" id="password"
                            class="w-full px-4 py-3 bg-white border border-gray-300 rounded-md text-right text-sm focus:outline-none focus:border-[var(--color-primary)]"
                            required>
                    </div>

                    <!-- Submit Button -->
                    <div class="pt-2">
                        <button type="submit"
                            class="w-full cursor-pointer bg-[var(--color-primary)] hover:bg-[var(--color-secondary)] text-white text-sm py-3 rounded-md font-medium transition-colors duration-200">
                            إنشاء الحساب
                        </button>
                    </div>

                    <!-- Login Link -->
                    <div class="text-center pt-2">
                        <p class="text-sm text-gray-600">
                            هل لديك حساب؟
                            <a href="employee-login.html"
                                class="text-[var(--color-fifth)] hover:text-[var(--color-third)] transition-colors duration-200 font-medium">تسجيل
                                دخول</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>

        <!-- Left Side - Logo and Background -->
        <div class="cover w-full lg:w-1/2 p-6 xl:px-16 order-1 lg:order-2">
            <div
                class="flex h-full  bg-[var(--color-primary)] rounded-3xl relative overflow-hidden items-center justify-center p-12">
                <!-- Background Image -->
                <div class="absolute lg:inset-10 inset-4 opacity-20">
                    <img src="../images/register-side-img.png" alt="Background"
                        class="w-full h-full object-cover rotate-180">
                </div>

                <!-- Logo Content -->
                <div class="relative z-10 text-center">
                    <img src="../images/light-logo.svg" alt="Phases Academy Logo" class="w-64 mx-auto mb-6">
                </div>
            </div>
        </div>
    </div>
</body>

</html>
